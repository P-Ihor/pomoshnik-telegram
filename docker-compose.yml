version: '3.8'
services:
  pomoshnik:
    image: openclaw/openclaw:latest
    container_name: pomoshnik_openclaw
    command:
    - node
    - openclaw.mjs
    - gateway
    - run
    - --allow-unconfigured
    restart: on-failure
    ports:
    - 3001:3001
    volumes:
    - ./openclaw_data:/app/data
    - ./openclaw/SOUL.md:/app/SOUL.md
    - ./openclaw/.mcp.json:/app/.mcp.json
    environment:
    - OPENCLAW_CONFIG_PATH=/app/data/openclaw.json
    - OPENCLAW_GATEWAY_TOKEN=${TELEGRAM_BOT_TOKEN}
    - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    - GATEWAY_MODE=local
    - OPENCLAW_HOME=/app/data
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '1.2'
    depends_on:
    - mcp-backend
    logging: &id001
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  mcp-backend:
    build:
      context: ./python-mcp
      dockerfile: Dockerfile
    container_name: pomoshnik_mcp_backend
    restart: always
    stdin_open: true
    tty: true
    volumes:
    - ./python-mcp:/app
    - ./openclaw_data:/openclaw_data:ro
    env_file:
    - .env
    environment:
    - FASTMCP_SERVER_HOST=0.0.0.0
    - FASTMCP_SERVER_PORT=8000
    - UVICORN_HOST=0.0.0.0
    - UVICORN_PORT=8000
    - HOST=0.0.0.0
    - PORT=8000
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '0.8'
    logging: *id001
volumes:
  openclaw_data: null
